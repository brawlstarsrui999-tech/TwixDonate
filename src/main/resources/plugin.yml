name: TwixDonate
version: 1.1.0
main: ru.twixrpg.donate.DonatePlugin
api-version: 1.21
author: TwixRPG
description: Красивое GUI меню для просмотра и покупки донат-привилегий на сервере TwixRPG. Киты загружаются динамически из EssentialsX.
softdepend: [Essentials]

commands:
  donate:
    description: Открыть меню донат-привилегий
    usage: /donate
    aliases: [don, магазин]
    permission: twixdonate.use

permissions:
  twixdonate.use:
    description: Разрешает использовать /donate
    default: true